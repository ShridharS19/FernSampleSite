# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: shridhar-sinha-demo.docs.buildwithfern.com

title: Sample | Documentation
default-language: python

announcement:
  message: "Welcome to the Fern take home docs assignment [→](https://www.buildwithfern.com/careers)"

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header


settings:
  dark-mode-code: true
  http-snippets: true
  search-text: Search the docs

tabs:
  home:
    display-name: Home
    skip-slug: true
  api-reference:
    display-name: API Reference
  instructions:
    display-name: Instructions

navigation:
  - tab: home
    layout:
      - page: Home
        path: docs/pages/landingpage.mdx
  - tab: api-reference
    layout:
      - api: API Reference
  - tab: instructions
    layout:
      - page: Instructions
        path: docs/pages/instructions.mdx

navbar-links:
  - type: minimal
    text: Learn More
    href: https://buildwithfern.com/
    rounded: false
  - type: outlined
    text: Plants
    href: https://buildwithfern.com/
    rounded: false
  - type: filled
    text: About Us
    href: https://buildwithfern.com/
    rounded: false
  
colors:
  accentPrimary:
    dark: "#FFFFFF"
    light: "#000000"
  background:
    light: "#FFFFFF"
  header-background:
    light: "#000000"
    dark: "#000000"

page-actions:
  options: 
    copy-page: true
    view-as-markdown: true
    ask-ai: false
    chatgpt: true
    claude: true
    claude-code: false
    cursor: false
    vscode: false
  
css: 
  - docs/assets/main.css

js:
  - custom.js

typography:
  bodyFont:
    name: clarkson
    paths: 
      - path: docs/assets/fonts/clarkson-300.woff2
        weight: 300
        style: normal
      - path: docs/assets/fonts/clarkson-400.woff2
        weight: 400
        style: normal
      - path: docs/assets/fonts/clarkson-500.woff2
        weight: 600
        style: normal

logo:
  dark: docs/assets/logo-dark.svg
  light: docs/assets/logo-light.svg
  height: 20
  href: /

favicon: docs/assets/favicon.svg
